<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullent</title>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <canvas
          id="game"
          width="460"
          height="560"
          tabindex="0"
          aria-label="Bullent game canvas"
        ></canvas>
        <button id="settings-toggle" type="button" aria-label="Configure level" title="Configure level" hidden>&#9881;</button>
        <div id="powers-bar">
          <div id="power-dash" class="power-bubble" title="Dash corto: V" aria-label="Dash corto, tecla V">
            <img src="/assets/powers/dash-bubble.svg" alt="" />
          </div>
          <div id="power-slow" class="power-bubble" title="Camara lenta: Ctrl" aria-label="Camara lenta, tecla Control">
            <img src="/assets/powers/slow-bubble.svg" alt="" />
          </div>
        </div>
        <section id="start-screen" aria-label="Pantalla de inicio de Bullent" hidden>
          <div class="start-hero">
            <h1>BULLENT</h1>
            <div class="start-rule" aria-hidden="true"></div>
            <p>BY DENIL</p>
          </div>

          <div class="start-intro">
            <p class="start-tagline">ESQUIVA EL CAOS. ROMPE TU RÉCORD.</p>
          </div>

          <div class="start-controls" aria-label="Controles de movimiento">
            <span>MOVIMIENTO</span>
            <kbd>WASD</kbd>
            <kbd>↑ ↓ ← →</kbd>
          </div>

          <div class="start-powers" aria-label="Poderes">
            <span class="start-section-label">PODERES</span>
            <article class="start-power-card">
              <div class="start-power-icon">
                <img src="/assets/powers/dash-bubble.svg" alt="" />
              </div>
              <div>
                <h2>Destello</h2>
                <p>Reposición rápida hacia tu dirección actual.</p>
              </div>
              <span class="start-pill">V</span>
            </article>
            <article class="start-power-card">
              <div class="start-power-icon">
                <img src="/assets/powers/slow-bubble.svg" alt="" />
              </div>
              <div>
                <h2>Letargo</h2>
                <p>Ralentiza la simulación mientras tengas energía.</p>
              </div>
              <span class="start-pill">CTRL</span>
            </article>
            <article class="start-power-card is-future">
              <div class="start-power-icon">
                <img src="/assets/powers/presagio-bubble.svg" alt="" />
              </div>
              <div>
                <h2>Presagio</h2>
                <p>Revela trayectorias de balas por un instante.</p>
              </div>
              <span class="start-pill">COMING SOON</span>
            </article>
          </div>

          <button id="start-cta" type="button">CLICK / ENTER - INICIAR</button>
        </section>
        <form id="settings-panel" aria-label="Level settings" hidden>
          <div class="settings-heading">
            <strong>Level</strong>
            <button id="settings-close" type="button" aria-label="Close settings">x</button>
          </div>

          <label>
            Name
            <input id="level-name" type="text" autocomplete="off" />
          </label>

          <div class="settings-grid">
            <label>
              Arena W
              <input id="arena-width" type="number" min="1" step="1" />
            </label>
            <label>
              Arena H
              <input id="arena-height" type="number" min="1" step="1" />
            </label>
            <label>
              Player R
              <input id="player-radius" type="number" min="1" step="1" />
            </label>
            <label>
              Player speed
              <input id="player-speed" type="number" min="1" step="1" />
            </label>
            <label>
              Bullet R
              <input id="bullet-radius" type="number" min="1" step="1" />
            </label>
            <label>
              Bullet speed
              <input id="bullet-speed" type="number" min="1" step="1" />
            </label>
            <label>
              Max bullets
              <input id="bullet-max" type="number" min="1" step="1" />
            </label>
          </div>

          <div class="settings-heading">
            <strong>Shooters</strong>
            <button id="add-shooter" type="button">Add</button>
          </div>
          <div id="shooters-list"></div>
          <p id="settings-error" role="alert"></p>

          <div class="settings-actions">
            <button id="reset-settings" type="button">Reset</button>
            <button id="cancel-settings" type="button">Cancel</button>
            <button id="apply-settings" type="submit">Apply</button>
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
